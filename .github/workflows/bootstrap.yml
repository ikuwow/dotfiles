name: Bootstrap

on:
  pull_request:
    branches:
      - main

jobs:
  bootstrap:
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Bootstrap
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          curl -L "https://raw.githubusercontent.com/ikuwow/dotfiles/${BRANCH}/bootstrap.sh" | bash -s -- "${BRANCH}"
      - name: Verify login shell
        if: runner.os == 'Linux'
        run: bash --login -c 'echo "Login shell OK"'
      - name: Verify deploy
        run: ~/dotfiles/scripts/verify_deploy.sh

  bootstrap-minimal:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap (minimal mode)
        env:
          BRANCH: ${{ github.head_ref }}
          DOTFILES_MINIMAL: "1"
        run: |
          curl -L "https://raw.githubusercontent.com/ikuwow/dotfiles/${BRANCH}/bootstrap.sh" | bash -s -- "${BRANCH}"
      - name: Verify login shell
        run: bash --login -c 'echo "Login shell OK"'
      - name: Verify deploy
        run: ~/dotfiles/scripts/verify_deploy.sh
