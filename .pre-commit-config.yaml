# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-added-large-files
      - id: check-symlinks
  - repo: local
    hooks:
      - id: verify-deploy
        name: Verify deploy.sh symlinks match verify_deploy.sh
        entry: scripts/verify_deploy.sh
        language: script
        pass_filenames: false
        files: ^scripts/(deploy|verify_deploy)\.sh$
      - id: check-rule-budget
        name: Enforce line-count budget on always-loaded AI rule files
        entry: scripts/check_rule_budget.sh
        language: script
        pass_filenames: false
        files: ^(AIRULES\.md|claude/rules/.*\.md)$
