prSections:
  - title: Needs My Review
    filters: is:open review-requested:@me -author:@me
  - title: My PRs
    filters: is:open author:@me sort:updated-desc
  - title: Involved
    filters: >-
      is:open involves:@me -author:@me -review-requested:@me
      updated:>={{ nowModify "-2w" }}
  - title: Recently Merged
    filters: >-
      is:merged author:@me
      merged:>={{ nowModify "-1w" }}

issuesSections:
  - title: Assigned
    filters: is:open assignee:@me
  - title: My Issues
    filters: is:open author:@me
  - title: Mentioned
    filters: >-
      is:open mentions:@me -author:@me -assignee:@me
      updated:>={{ nowModify "-2w" }}

notificationsSections:
  - title: All
    filters: ""
  - title: Mentions
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign

# Local clone locations. ghq root is ~/ghq/github.com/<owner>/<repo>.
# Enumerate owners so `c` (checkout) resolves to the right worktree.
repoPaths:
  ikuwow/*: ~/ghq/github.com/ikuwow/*
  tacoms-inc-dev/*: ~/ghq/github.com/tacoms-inc-dev/*
  anthropics/*: ~/ghq/github.com/anthropics/*
  DataDog/*: ~/ghq/github.com/DataDog/*
  aws/*: ~/ghq/github.com/aws/*
  Homebrew/*: ~/ghq/github.com/Homebrew/*
  mol-jp/*: ~/ghq/github.com/mol-jp/*
  pipe-cd/*: ~/ghq/github.com/pipe-cd/*

defaults:
  preview:
    open: true
    width: 0.5
    height: 0.6
    position: auto
  prsLimit: 30
  issuesLimit: 20
  notificationsLimit: 20
  prApproveComment: LGTM
  view: prs
  refetchIntervalMinutes: 30

repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60

theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false

confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
# Focus on unread notifications. Toggle with `t` in the notifications view.
includeReadNotifications: false
